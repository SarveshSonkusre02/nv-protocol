[build-system]
requires = ["setuptools>=61.0.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "nv-protocol"
version = "0.1.0"
authors = [
    { name = "Open-Source Software Security Initiative", email = "info@nvprotocol.org" }
]
description = "Context-Isolated Secret Management for Autonomous AI Software Engineering Agents"
readme = "README.md"
requires-python = ">=3.8"
classifiers = [
    "Programming Language :: Python :: 3",
    "License :: OSI Approved :: MIT License",
    "Operating System :: Microsoft :: Windows",
]
dependencies = [
    "cryptography>=39.0.0"
]

[project.scripts]
nvenv = "nv:main"

[tool.setuptools]
py-modules = ["nv", "vault", "ca", "proxy", "runner", "git"]
